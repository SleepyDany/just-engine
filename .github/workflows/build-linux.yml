name: Linux build

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

env:
  PLATFORM: linux
  TARGETS: JustEngineExe

jobs:
  build-debug:
    uses: ./.github/workflows/build-custom.yml
    with:
      branch: ${{github.ref-name}}
      platform: "linux"
      target: "JustEngineExe"
      configuration: "Debug"
      upload_artifacts: true

  build-release:
    uses: ./.github/workflows/build-custom.yml
    with:
      branch: ${{github.ref-name}}
      platform: "linux"
      target: "JustEngineExe"
      configuration: "Release"
      upload_artifacts: true

