name: Windows build

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

env:
  PLATFORM: windows
  TARGETS: JustEngineExe

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        configuration:
          - Debug
          - Release
    steps:
      - name: Checkout branch ${{github.ref_name}}
        uses: actions/checkout@v5

      - name: Configure CMake
        run: cmake -B ${{github.workspace}}/Build -DCMAKE_BUILD_TYPE=${{matrix.configuration}}

      - name: Build
        run: cmake --build ${{github.workspace}}/Build --config ${{matrix.configuration}} -v --target ${{env.TARGETS}}

      - name: Archive artifacts
        run: Compress-Archive -Path Build/Binaries/* -DestinationPath artifacts-${{env.PLATFORM}}-${{matrix.configuration}}.zip

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{env.PLATFORM}}-${{matrix.configuration}}
          path: artifacts-${{env.PLATFORM}}-${{matrix.configuration}}.zip
